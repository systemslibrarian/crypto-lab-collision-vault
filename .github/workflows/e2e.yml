name: E2E & Accessibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demos/collision-vault/package-lock.json

      - name: Install dependencies
        working-directory: demos/collision-vault
        run: npm install

      - name: Install Playwright browsers
        working-directory: demos/collision-vault
        run: npx playwright install --with-deps chromium

      - name: Run Playwright + axe tests
        working-directory: demos/collision-vault
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: demos/collision-vault/playwright-report/
          retention-days: 7
